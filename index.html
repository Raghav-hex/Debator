<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Debate Arena</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; padding: 20px; }
        .arena { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 15px; border-radius: 8px; border-left: 5px solid; }
        .pro { background: #1a365d; border-color: #3182ce; }
        .con { background: #5f1015; border-color: #e53e3e; }
        .verdict { background: #4a3f00; border-color: #ecc94b; text-align: center; }
    </style>
</head>
<body>
    <div class="arena" id="arena">
        <input type="text" id="topic" value="We live in a simulation">
        <button onclick="startDebate()">Start</button>
    </div>
    <script>
        function startDebate() {
            const arena = document.getElementById('arena');
            const topic = document.getElementById('topic').value;
            const source = new EventSource(`/debate?topic=${encodeURIComponent(topic)}`);
            
            source.onmessage = (e) => {
                const data = JSON.parse(e.data);
                const div = document.createElement('div');
                div.className = `message ${data.type === 'verdict' ? 'verdict' : (data.sender.includes('Pro') ? 'pro' : 'con')}`;
                div.innerHTML = `<strong>${data.sender}</strong><br>${data.text}`;
                arena.appendChild(div);
                window.scrollTo(0, document.body.scrollHeight);
                if(data.type === 'verdict') source.close();
            };
        }
    </script>
</body>
</html>
